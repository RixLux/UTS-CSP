site_name: "UTS-CSP Documentation"
site_description: "Documentation"
site_url: "https://rixlux.github.io/UTS-CSP/"

repo_name: "RixLux/UTS-CSP"
repo_url: "https://github.com/RixLux/UTS-CSP"

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra:
  generator: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search
  - i18n:
      languages:
        - locale: id
          name: Bahasa Indonesia
          build: true
        - locale: en
          default: true
          name: English
          build: true
  - swagger-ui-tag
  # - render_swagger
  - git-revision-date-localized:
      enable_creation_date: !ENV [CI, false]
      fallback_to_build_date: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - API: API.md
  - UTS: UTS.md
  - API: .backup/20260623_202643/API.md
  - UTS: .backup/20260623_202643/UTS.md
  - API: .backup/20260623_203602/API.md
  - UTS: .backup/20260623_203602/UTS.md
